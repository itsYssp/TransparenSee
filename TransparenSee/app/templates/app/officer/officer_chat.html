{% extends base_template %} {% load static %} {% block con %}

<div class="flex flex-col flex-1 min-h-0 h-full overflow-hidden">
  <div class="px-6 pt-6 pb-3 bg-white border-b border-gray-100 shrink-0">
    <div class="flex items-center justify-between mb-4">
      <div>
        <p class="text-xs font-bold tracking-widest text-gray-400 uppercase mb-0.5">Community</p>
        <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">Chat</h1>
      </div>

      <div class="flex items-center gap-2 bg-green-50 border border-green-100 text-green-600 text-xs font-semibold px-3 py-1.5 rounded-full">
        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
        Live Updates
      </div>
    </div>

    <div class="flex bg-gray-100 rounded-xl p-1 gap-1">
      <button
        type="button"
        data-tab="global_chat"
        class="chat-tab flex-1 flex items-center justify-center gap-2 text-sm font-semibold py-2 px-3 rounded-lg transition-all duration-200 bg-white text-blue-700 shadow-sm"
      >
        <i data-lucide="globe" class="w-4 h-4"></i>
        Global Chat
      </button>
      <button
        type="button"
        data-tab="announcements"
        class="chat-tab flex-1 flex items-center justify-center gap-2 text-sm font-semibold py-2 px-3 rounded-lg transition-all duration-200 text-gray-500 hover:text-gray-700"
      >
        <i data-lucide="megaphone" class="w-4 h-4"></i>
        Announcements
      </button>
    </div>
  </div>

  <div id="global-chat-panel" class="flex flex-col flex-1 min-h-0 overflow-hidden">
    <div id="messages" class="flex-1 overflow-y-auto px-6 py-4 space-y-3"></div>

    <div class="shrink-0 bg-white border-t border-gray-100 px-6 py-4">
      <form id="global-chat-form" class="flex gap-3 items-end">
        {% csrf_token %}
        <input type="hidden" name="type" value="global_chat" />
        <div class="w-8 h-8 rounded-xl overflow-hidden border-2 border-blue-100 shrink-0 shadow-sm mb-0.5">
          <img
            src="{% if user.profile_image %}{{ user.profile_image.url }}{% else %}{% static 'images/default_profile_pic.jpg' %}{% endif %}"
            alt="you"
            class="w-full h-full object-cover"
          />
        </div>

        <div class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl px-4 py-3 focus-within:border-blue-400 focus-within:bg-white transition-all">
          <textarea
            name="message"
            placeholder="Write a message..."
            rows="1"
            class="chat-input w-full bg-transparent text-sm text-gray-800 placeholder-gray-400 resize-none outline-none"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
          ></textarea>
        </div>

        <button class="btn btn-primary btn-sm h-10 w-10 p-0 rounded-xl shadow-sm shrink-0">
          <i data-lucide="send" class="w-4 h-4"></i>
        </button>
      </form>
    </div>
  </div>

  <div id="announcements-panel" class="hidden flex-col flex-1 min-h-0 overflow-hidden">
    <div id="announcements" class="flex-1 overflow-y-auto px-6 py-4 space-y-4"></div>

    <div class="shrink-0 bg-white border-t border-gray-100 px-6 py-4 space-y-3">
      {% if can_post_global_announcement %}
      <form id="global-announcement-form" class="flex gap-3 items-end">
        {% csrf_token %}
        <input type="hidden" name="type" value="global_announcement" />
        <div class="flex-1 bg-red-50 border border-red-200 rounded-2xl px-4 py-3 focus-within:border-red-400 focus-within:bg-white transition-all">
          <textarea
            name="message"
            placeholder="Post a global announcement for everyone..."
            rows="1"
            class="chat-input w-full bg-transparent text-sm text-gray-800 placeholder-gray-400 resize-none outline-none"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
          ></textarea>
        </div>
        <button class="btn btn-error btn-sm h-10 px-5 gap-2 rounded-xl shadow-sm shrink-0">
          <i data-lucide="megaphone" class="w-4 h-4"></i>
          Global
        </button>
      </form>
      {% endif %}

      {% if can_post_org_announcement %}
      <form id="org-announcement-form" class="flex gap-3 items-end">
        {% csrf_token %}
        <input type="hidden" name="type" value="organization_announcement" />
        <div class="flex-1 bg-amber-50 border border-amber-200 rounded-2xl px-4 py-3 focus-within:border-amber-400 focus-within:bg-white transition-all">
          <textarea
            name="message"
            placeholder="Post an organization announcement..."
            rows="1"
            class="chat-input w-full bg-transparent text-sm text-gray-800 placeholder-gray-400 resize-none outline-none"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
          ></textarea>
        </div>
        <button class="btn btn-warning btn-sm h-10 px-5 gap-2 rounded-xl shadow-sm shrink-0">
          <i data-lucide="megaphone" class="w-4 h-4"></i>
          Announce
        </button>
      </form>
      {% endif %}
    </div>
  </div>
</div>

<script>
const defaultAvatar = "{% static 'images/default_profile_pic.jpg' %}";
const currentUserId = {{ user.id }};
const feedUrl = "{% url 'chat_feed' %}";
const postUrl = "{% url 'chat' %}";
const messagesEl = document.getElementById('messages');
const announcementsEl = document.getElementById('announcements');
const globalChatPanel = document.getElementById('global-chat-panel');
const announcementsPanel = document.getElementById('announcements-panel');
const tabButtons = document.querySelectorAll('.chat-tab');
let activeTab = 'global_chat';
let pollHandle = null;
let latestSignature = '';

function getCsrfToken(form) {
  return form.querySelector('input[name="csrfmiddlewaretoken"]').value;
}

function switchTab(tab) {
  activeTab = tab;
  tabButtons.forEach((button) => {
    const isActive = button.dataset.tab === tab;
    button.classList.toggle('bg-white', isActive);
    button.classList.toggle('text-blue-700', isActive);
    button.classList.toggle('shadow-sm', isActive);
    button.classList.toggle('text-gray-500', !isActive);
  });
  globalChatPanel.classList.toggle('hidden', tab !== 'global_chat');
  globalChatPanel.classList.toggle('flex', tab === 'global_chat');
  announcementsPanel.classList.toggle('hidden', tab !== 'announcements');
  announcementsPanel.classList.toggle('flex', tab === 'announcements');
}

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function renderMessages(messages) {
  if (!messages.length) {
    messagesEl.innerHTML = `
      <div class="flex flex-col items-center justify-center h-full py-20 text-center">
        <div class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center mb-3">
          <i data-lucide="message-circle" class="w-6 h-6 text-gray-400"></i>
        </div>
        <p class="text-sm font-semibold text-gray-400">No messages yet</p>
        <p class="text-xs text-gray-300 mt-1">Be the first to say something</p>
      </div>
    `;
    lucide.createIcons();
    return;
  }

  messagesEl.innerHTML = messages.map((msg) => {
    const avatar = escapeHtml(msg.avatar || defaultAvatar);
    if (msg.is_self) {
      return `
        <div class="chat-item flex gap-3 items-end justify-end opacity-0 translate-y-2 transition-all duration-200 ease-out">
          <div class="flex flex-col items-end gap-1 max-w-sm">
            <div class="flex items-center gap-2">
              <span class="text-xs text-gray-400">${escapeHtml(msg.time)}</span>
              <span class="text-xs font-bold text-gray-700">You</span>
            </div>
            <div class="bg-blue-700 text-white rounded-2xl rounded-br-sm px-4 py-2.5 shadow-sm">
              <p class="whitespace-pre-wrap break-words text-sm leading-relaxed">${escapeHtml(msg.message)}</p>
            </div>
          </div>
          <div class="w-8 h-8 rounded-xl overflow-hidden border-2 border-blue-200 shrink-0 shadow-sm">
            <img src="${avatar}" alt="avatar" class="w-full h-full object-cover" />
          </div>
        </div>
      `;
    }

    return `
      <div class="chat-item flex gap-3 items-end opacity-0 translate-y-2 transition-all duration-200 ease-out">
        <div class="w-8 h-8 rounded-xl overflow-hidden border-2 border-gray-200 shrink-0 shadow-sm">
          <img src="${avatar}" alt="avatar" class="w-full h-full object-cover" />
        </div>
        <div class="flex flex-col gap-1 max-w-sm">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xs font-bold text-gray-700">${escapeHtml(msg.author)}</span>
            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${escapeHtml(msg.role)}</span>
            <span class="text-xs text-gray-400">${escapeHtml(msg.time)}</span>
          </div>
          <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-2.5 shadow-sm">
            <p class="whitespace-pre-wrap break-words text-sm text-gray-800 leading-relaxed">${escapeHtml(msg.message)}</p>
          </div>
          ${msg.organization ? `<span class="text-xs text-gray-400 ml-1">${escapeHtml(msg.organization)}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  lucide.createIcons();
  requestAnimationFrame(() => {
    messagesEl.querySelectorAll('.chat-item').forEach((item) => {
      item.classList.remove('opacity-0', 'translate-y-2');
    });
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderAnnouncements(orgAnnouncements, globalAnnouncements) {
  const items = [
    ...globalAnnouncements.map((item) => ({ ...item, priority: 0 })),
    ...orgAnnouncements.map((item) => ({ ...item, priority: 1 })),
  ].sort((a, b) => {
  if (a.priority !== b.priority) {
    return a.priority - b.priority; // global first
  }
  return new Date(a.time) - new Date(b.time); // newest first
});

  if (!items.length) {
    announcementsEl.innerHTML = `
      <div class="flex flex-col items-center justify-center h-full py-20 text-center">
        <div class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center mb-3">
          <i data-lucide="megaphone" class="w-6 h-6 text-gray-400"></i>
        </div>
        <p class="text-sm font-semibold text-gray-400">No announcements yet</p>
        <p class="text-xs text-gray-300 mt-1">New posts will appear here automatically</p>
      </div>
    `;
    lucide.createIcons();
    return;
  }

  announcementsEl.innerHTML = items.map((item) => {
    if (item.scope === 'global') {
      return `
        <div class="chat-item flex gap-3 items-start opacity-0 translate-y-2 transition-all duration-200 ease-out">
          <div class="w-10 h-10 rounded-xl bg-red-100 text-red-700 flex items-center justify-center shrink-0 shadow-sm">
            <i data-lucide="megaphone" class="w-5 h-5"></i>
          </div>
          <div class="flex flex-col gap-1 max-w-3xl">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-xs font-bold text-gray-700">${escapeHtml(item.author)}</span>
              <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">${escapeHtml(item.role)}, ${escapeHtml(item.department)}</span>
              <span class="text-xs text-gray-400">${escapeHtml(item.time)}</span>
              <span class="bg-red-100 text-red-600 text-xs font-bold px-2 py-0.5 rounded-full">Global</span>
            </div>
            <div class="bg-white border border-red-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
              <p class="whitespace-pre-wrap break-words text-sm text-gray-800 leading-relaxed">${escapeHtml(item.message)}</p>
            </div>
          </div>
        </div>
      `;
    }

    const logo = escapeHtml(item.logo || defaultAvatar);
    return `
      <div class="chat-item flex gap-3 items-start opacity-0 translate-y-2 transition-all duration-200 ease-out">
        <div class="w-9 h-9 rounded-xl overflow-hidden border-2 border-blue-100 shrink-0 shadow-sm">
          <img src="${logo}" alt="org logo" class="w-full h-full object-cover" />
        </div>
        <div class="flex flex-col gap-1 max-w-3xl">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xs font-bold text-gray-700">${escapeHtml(item.organization)}</span>
            <span class="text-xs text-gray-400">${escapeHtml(item.time)}</span>
            <span class="bg-amber-100 text-amber-600 text-xs font-bold px-2 py-0.5 rounded-full">Organization</span>
          </div>
          <div class="bg-white border border-amber-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
            <p class="whitespace-pre-wrap break-words text-sm text-gray-800 leading-relaxed">${escapeHtml(item.message)}</p>
          </div>
        </div>
      </div>
    `;
  }).join('');

  lucide.createIcons();
  requestAnimationFrame(() => {
    announcementsEl.querySelectorAll('.chat-item').forEach((item) => {
      item.classList.remove('opacity-0', 'translate-y-2');
    });
  });
}

async function fetchFeed() {
  const response = await fetch(feedUrl, { headers: { 'x-requested-with': 'XMLHttpRequest' } });
  const data = await response.json();
  const signature = JSON.stringify({
    messages: data.global_messages.map((item) => [item.id, item.time]),
    org: data.organization_announcements.map((item) => [item.id, item.time]),
    global: data.global_announcements.map((item) => [item.id, item.time]),
  });

  if (signature !== latestSignature) {
    latestSignature = signature;
    renderMessages(data.global_messages);
    renderAnnouncements(data.organization_announcements, data.global_announcements);
  }
}

async function submitForm(form) {
  const formData = new FormData(form);
  const response = await fetch(postUrl, {
    method: 'POST',
    headers: { 'x-requested-with': 'XMLHttpRequest', 'x-csrftoken': getCsrfToken(form) },
    body: formData,
  });
  const payload = await response.json();
  if (!response.ok || !payload.ok) {
    alert('Unable to post right now. Please try again.');
    return;
  }

  form.reset();
  const textarea = form.querySelector('textarea');
  if (textarea) {
    textarea.style.height = 'auto';
  }
  latestSignature = '';
  await fetchFeed();
}

function bindEnterToSubmit(textarea) {
  textarea.addEventListener('keydown', async (event) => {
    if (event.key !== 'Enter' || event.shiftKey) {
      return;
    }

    event.preventDefault();
    const form = textarea.closest('form');
    if (!form) {
      return;
    }

    const hasContent = textarea.value.trim().length > 0;
    if (!hasContent) {
      return;
    }

    await submitForm(form);
  });
}

document.getElementById('global-chat-form')?.addEventListener('submit', async (event) => {
  event.preventDefault();
  await submitForm(event.currentTarget);
});

document.getElementById('org-announcement-form')?.addEventListener('submit', async (event) => {
  event.preventDefault();
  await submitForm(event.currentTarget);
  switchTab('announcements');
});

document.getElementById('global-announcement-form')?.addEventListener('submit', async (event) => {
  event.preventDefault();
  await submitForm(event.currentTarget);
  switchTab('announcements');
});

tabButtons.forEach((button) => {
  button.addEventListener('click', () => switchTab(button.dataset.tab));
});

document.addEventListener('DOMContentLoaded', async () => {
  document.querySelectorAll('.chat-input').forEach(bindEnterToSubmit);
  switchTab('global_chat');
  await fetchFeed();
  pollHandle = window.setInterval(fetchFeed, 3000);
});
</script>

{% endblock con %}
